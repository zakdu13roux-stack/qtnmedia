<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Artistique | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes pixelSlide {
            0% {
                opacity: 0;
                transform: translateX(-120vw) scale(0.8);
            }
            70% {
                opacity: 1;
                transform: translateX(15px) scale(1.05);
            }
            85% {
                transform: translateX(-5px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        @keyframes floatBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .animated-title {
            animation: pixelSlide 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                       floatBounce 3s ease-in-out 1.8s infinite;
            opacity: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #ffffff !important;
            font-weight: 400;
            will-change: transform, opacity;
            background: none !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: #ffffff !important;
            text-shadow: 0 4px 12px rgba(196, 132, 252, 0.5) !important;
            background-clip: unset !important;
        }

        @media (max-width: 768px) {
            .animated-title {
                font-size: 1.2rem;
            }
        }

        /* Custom hero background for artbook */
        .project-hero {
            background: linear-gradient(135deg, rgba(196, 132, 252, 0.5), rgba(167, 139, 250, 0.5)) !important;
            background-color: #1e293b !important;
        }

        .project-hero::before {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(196, 132, 252, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.4) 0%, transparent 50%) !important;
        }

        .project-hero p {
            color: #e2e8f0 !important;
            font-weight: 600 !important;
            font-size: 1.4rem !important;
        }

        .back-button {
            background: rgba(167, 139, 250, 0.2) !important;
            color: #ffffff !important;
            border: 2px solid rgba(167, 139, 250, 0.5) !important;
            padding: 0.8rem 1.5rem !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            transition: all 0.3s ease !important;
            backdrop-filter: blur(10px) !important;
        }

        .back-button:hover {
            background: rgba(167, 139, 250, 0.4) !important;
            border-color: rgba(167, 139, 250, 0.8) !important;
            transform: translateX(-5px) !important;
            box-shadow: 0 5px 15px rgba(167, 139, 250, 0.3) !important;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 3rem 0 2.5rem 0;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.08), rgba(99, 102, 241, 0.08));
            border-radius: 20px;
            border: 2px solid rgba(167, 139, 250, 0.25);
        }

        .category-tab {
            padding: 0.9rem 1.8rem;
            border: 2px solid rgba(167, 139, 250, 0.4);
            background: rgba(167, 139, 250, 0.08);
            color: #a78bfa;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            text-transform: capitalize;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        .category-tab::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.3), rgba(99, 102, 241, 0.2));
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 50px;
        }

        .category-tab:hover {
            border-color: rgba(167, 139, 250, 0.8);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.3);
        }

        .category-tab:hover::before {
            opacity: 1;
        }

        .category-tab.active {
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%);
            border-color: #a78bfa;
            color: #ffffff;
            box-shadow: 0 8px 25px rgba(167, 139, 250, 0.5), 0 0 20px rgba(167, 139, 250, 0.3);
            transform: translateY(-4px) scale(1.08);
        }

        .category-tab.active::before {
            opacity: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
        }

        /* Restore explicit active styling for 'Tous les dessins' (data-category="all") */
        .category-tab[data-category="all"].active {
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%) !important;
            border-color: #a78bfa !important;
            color: #ffffff !important;
            box-shadow: 0 8px 25px rgba(167, 139, 250, 0.5), 0 0 20px rgba(167, 139, 250, 0.3) !important;
            transform: translateY(-4px) scale(1.08) !important;
        }

        .category-tab[data-category="all"].active::before {
            opacity: 1 !important;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1)) !important;
        }

        @keyframes buttonPulse {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Gallery Section */
        .gallery-section {
            padding: 10px 0;
            background: rgba(15, 23, 42, 0.04);
        }

        /* Mosaic Gallery Display */
        .book-display {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            gap: 0;
        }

        .book-category-nav-button {
            display: none;
        }

        .book-category-nav-button:hover:not(:disabled) {
            background: rgba(167, 139, 250, 0.6);
            border-color: rgba(167, 139, 250, 1);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        .book-category-nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Masonry Grid Layout */
        .book-category {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.03) 0%, rgba(99, 102, 241, 0.03) 100%);
            border-radius: 12px;
            border: 2px solid rgba(167, 139, 250, 0.2);
            animation: galleryFadeIn 0.6s ease-out;
        }

        /* Style pour "Tous les dessins" - original purple */
        .book-category.category-all {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.03) 0%, rgba(99, 102, 241, 0.03) 100%);
            border-color: rgba(167, 139, 250, 0.2);
        }

        .book-category.category-all .book-image-item {
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.15);
        }

        .book-category.category-all .book-image-item:hover {
            box-shadow: 0 12px 30px rgba(167, 139, 250, 0.25);
        }

        /* ===== MANGA - Style Audacieux Orange ===== */
        .book-category.category-manga {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, rgba(245, 158, 11, 0.12) 100%);
            border: 3px solid rgba(249, 115, 22, 0.4);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .book-category.category-manga::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(249, 115, 22, 0.05) 2px, rgba(249, 115, 22, 0.05) 4px);
            pointer-events: none;
        }

        .book-category.category-manga .book-image-item {
            border: 2px solid rgba(249, 115, 22, 0.5);
            box-shadow: 
                0 0 0 1px rgba(249, 115, 22, 0.2),
                0 8px 20px rgba(249, 115, 22, 0.2),
                inset 0 0 0 1px rgba(249, 115, 22, 0.1);
            background: linear-gradient(135deg, #fff8f3, #fffbf0);
        }

        .book-category.category-manga .book-image-item:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 
                0 0 0 2px rgba(249, 115, 22, 0.4),
                0 15px 40px rgba(249, 115, 22, 0.3),
                inset 0 0 20px rgba(249, 115, 22, 0.15);
            border-color: rgba(249, 115, 22, 0.8);
        }

        /* ===== COMPOSITIONS - Style Minimaliste Bleu ===== */
        .book-category.category-compositions {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(96, 165, 250, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 8px;
            padding: 3rem 2rem;
        }

        .book-category.category-compositions .book-image-item {
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.1);
            background: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
        }

        .book-category.category-compositions .book-image-item:hover {
            border-color: rgba(59, 130, 246, 0.8);
            box-shadow: 
                0 8px 24px rgba(59, 130, 246, 0.2),
                0 0 0 1px rgba(59, 130, 246, 0.5) inset;
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.95);
        }

        /* ===== NOIR-BLANC - Style Sombre et Dramatique ===== */
        .book-category.category-noir-blanc {
            background: linear-gradient(135deg, rgba(20, 25, 35, 0.4) 0%, rgba(35, 45, 60, 0.3) 100%);
            border: 2px solid rgba(100, 116, 139, 0.6);
            border-radius: 0;
        }

        .book-category.category-noir-blanc .book-image-item {
            border: 1px solid rgba(71, 85, 105, 0.7);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .book-category.category-noir-blanc .book-image-item:hover {
            border-color: rgba(148, 163, 184, 0.8);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                0 0 1px rgba(148, 163, 184, 0.5) inset;
            transform: translateY(-6px) scale(1.02);
            background: linear-gradient(135deg, #0f172a, #0f172a);
            filter: brightness(1.1);
        }

        /* ===== INKTOBER - Style Artistique Vibrant ===== */
        .book-category.category-inktober {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(168, 85, 247, 0.15) 100%);
            border: 3px dashed rgba(139, 92, 246, 0.5);
            border-radius: 12px;
            position: relative;
        }

        .book-category.category-inktober::after {
            content: '✨ Inktober ✨';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 0.8rem;
            color: rgba(139, 92, 246, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .book-category.category-inktober .book-image-item {
            border: 2px solid rgba(139, 92, 246, 0.6);
            box-shadow: 
                0 0 0 2px rgba(139, 92, 246, 0.2),
                0 8px 20px rgba(139, 92, 246, 0.25),
                0 0 20px rgba(168, 85, 247, 0.1);
            background: linear-gradient(135deg, #f5f3ff, #faf5ff);
            position: relative;
        }

        .book-category.category-inktober .book-image-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(139, 92, 246, 0.02) 2px,
                rgba(139, 92, 246, 0.02) 4px
            );
            pointer-events: none;
        }

        .book-category.category-inktober .book-image-item:hover {
            transform: translateY(-10px) rotate(-2deg);
            border-color: rgba(139, 92, 246, 0.9);
            box-shadow: 
                0 0 0 3px rgba(139, 92, 246, 0.4),
                0 15px 40px rgba(139, 92, 246, 0.35),
                0 0 30px rgba(168, 85, 247, 0.2);
        }

        /* ===== PORTRAITS - Style doux et centré sur le visage ===== */
        .category-tab[data-category="portraits"].active {
            background: linear-gradient(135deg,#ffdbe6,#ffeef6) !important;
            border-color: #f472b6 !important;
            color: #4b102b !important;
            box-shadow: 0 8px 24px rgba(244,114,182,0.08) !important;
            transform: translateY(-3px) scale(1.02) !important;
        }

        .book-category.category-portraits {
            background: linear-gradient(135deg, rgba(255, 250, 252, 1), rgba(255, 244, 249, 1));
            border: 1px solid rgba(244,114,182,0.12);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(16,24,40,0.02);
        }

        .book-category.category-portraits .book-image-item {
            background: linear-gradient(180deg,#fff #fffefc);
            border: 1px solid rgba(244,114,182,0.06);
            box-shadow: 0 6px 20px rgba(244,114,182,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-category.category-portraits .book-image-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(16,24,40,0.06);
        }

        .book-category.category-portraits .image-description {
            background: rgba(255,242,247,0.9);
            border-top: 1px solid rgba(244,114,182,0.08);
            color: #6b2940;
        }

        .book-category.category-portraits .image-description strong {
            color: #7a2b46;
        }

        /* Petite icône caméra/portrait sur les vignettes */
        .book-category.category-portraits .book-image-item::before {
            content: '🖼️';
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 14px;
            opacity: 0.9;
            transform: rotate(-6deg);
            pointer-events: none;
        }

        

        @media (max-width: 1400px) {
            .book-category {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1000px) {
            .book-category {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .book-category {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .book-category {
                grid-template-columns: 1fr;
            }
        }

        /* Masonry items - dynamisme en hauteur */
        .book-image-item {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            height: fit-content;
        }

        /* Certaines images plus hautes pour le dynamisme */
        .book-image-item:nth-child(4n+1) .book-image-wrapper {
            min-height: 320px;
        }

        .book-image-item:nth-child(7n+3) .book-image-wrapper {
            min-height: 300px;
        }

        .book-image-wrapper {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(99, 102, 241, 0.1));
            padding: 0.3rem;
        }

        .book-image-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .book-image-item:hover img {
            transform: scale(1.08);
        }

        /* Image hover par catégorie */
        .book-category.category-manga .book-image-item:hover img {
            transform: scale(1.15) rotate(2deg);
        }

        .book-category.category-compositions .book-image-item:hover img {
            transform: scale(1.05);
        }

        .book-category.category-noir-blanc .book-image-item:hover img {
            transform: scale(1.08) brightness(1.15);
        }

        .book-category.category-inktober .book-image-item:hover img {
            transform: scale(1.12) rotate(-1deg);
        }

        

        .book-image-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(167, 139, 250, 0.25);
        }

        /* Strong rule: use flex and force each child to 50% width (important)
           so the two selected images each take half the row. Falls back to
           stacking below 768px. */
        .book-image-pair {
            grid-column: 1 / -1;
            display: flex !important;
            flex-direction: row !important;
            gap: 1rem !important;
            width: 100% !important;
            box-sizing: border-box !important;
            align-items: stretch !important;
        }

        .book-image-pair > .book-image-item {
            flex: 0 0 50% !important;
            max-width: 50% !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .book-image-pair .book-image-wrapper {
            width: 100% !important;
            display: block !important;
        }

        .book-image-pair .book-image-item img {
            width: 100% !important;
            height: auto !important;
            display: block !important;
            object-fit: contain !important;
        }

        @media (max-width: 768px) {
            .book-image-pair {
                flex-direction: column !important;
            }

            .book-image-pair > .book-image-item {
                flex: 1 1 100% !important;
                max-width: 100% !important;
            }
        }

        .book-image-item:hover .image-description {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.15) 0%, rgba(99, 102, 241, 0.15) 100%);
        }

        /* HOVER STYLES PAR CATÉGORIE */
        .book-category.category-manga .book-image-item:hover {
            transform: none;
            box-shadow: 
                0 0 0 3px rgba(249, 115, 22, 0.4),
                0 15px 40px rgba(249, 115, 22, 0.3),
                inset 0 0 20px rgba(249, 115, 22, 0.15);
        }

        .book-category.category-manga .book-image-item:hover .image-description {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, rgba(245, 158, 11, 0.15) 100%);
            border-top-color: rgba(249, 115, 22, 0.6);
        }

        .book-category.category-manga .book-image-item:hover .image-description strong {
            color: rgba(249, 115, 22, 0.9);
        }

        .book-category.category-compositions .book-image-item:hover {
            transform: scale(1.03);
            box-shadow: 
                0 8px 24px rgba(59, 130, 246, 0.2),
                0 0 0 1px rgba(59, 130, 246, 0.5) inset;
        }

        .book-category.category-compositions .book-image-item:hover .image-description {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(96, 165, 250, 0.15) 100%);
            border-top-color: rgba(59, 130, 246, 0.6);
        }

        .book-category.category-compositions .book-image-item:hover .image-description strong {
            color: rgba(59, 130, 246, 0.9);
        }

        .book-category.category-noir-blanc .book-image-item:hover {
            transform: none;
            border-color: rgba(148, 163, 184, 0.8);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                0 0 1px rgba(148, 163, 184, 0.5) inset;
            filter: brightness(1.1);
        }

        .book-category.category-noir-blanc .book-image-item:hover .image-description {
            background: rgba(71, 85, 105, 0.15);
            border-top-color: rgba(148, 163, 184, 0.6);
        }

        .book-category.category-noir-blanc .book-image-item:hover .image-description strong {
            color: rgba(148, 163, 184, 0.9);
        }

        .book-category.category-inktober .book-image-item:hover {
            transform: none;
            border-color: rgba(139, 92, 246, 0.9);
            box-shadow: 
                0 0 0 3px rgba(139, 92, 246, 0.4),
                0 15px 40px rgba(139, 92, 246, 0.35),
                0 0 30px rgba(168, 85, 247, 0.2);
        }

        .book-category.category-inktober .book-image-item:hover .image-description {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%);
            border-top-color: rgba(139, 92, 246, 0.6);
        }

        .book-category.category-inktober .book-image-item:hover .image-description strong {
            color: rgba(139, 92, 246, 0.9);
        }

        /* ===== SKETCHES - Dedicated style and matching active tab ===== */
        .category-tab[data-category="sketches"].active {
            background: linear-gradient(135deg,#ffd9b3,#ffe6cc);
            border-color: #ffb86b;
            color: #5a3000;
            box-shadow: 0 8px 24px rgba(255, 184, 108, 0.15);
            transform: translateY(-3px) scale(1.02);
        }

        .book-category.category-sketches {
            background: linear-gradient(135deg,#fffaf2,#fff3e6);
            border: 1px solid rgba(255, 184, 108, 0.18);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(16,24,40,0.03);
        }

        .book-category.category-sketches .book-image-item {
            background: linear-gradient(180deg,#ffffff,#fffdf9);
            border: 1px solid rgba(16,24,40,0.04);
            box-shadow: 0 6px 20px rgba(16,24,40,0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-category.category-sketches .book-image-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(16,24,40,0.08);
        }

        .book-category.category-sketches .image-description {
            background: rgba(255,246,236,0.9);
            border-top: 1px solid rgba(255,184,108,0.12);
            color: #6b4a2a;
        }

        .book-category.category-sketches .image-description strong {
            color: #7a4b1e;
        }

        /* Décorations légères pour rappeler le mot "sketch" : crayon, griffonnage, coin */
        .book-category.category-sketches {
            position: relative;
            overflow: visible;
        }

        .book-category.category-sketches::before {
            content: '';
            position: absolute;
            top: -8px;
            right: 18px;
            width: 64px;
            height: 64px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><g fill='none' stroke='%235a3000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M45 6l13 13-33 33-13 3 3-13z'/><path d='M45 6l8 8' stroke-opacity='0.9'/></g></svg>");
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.28;
            transform: rotate(-20deg);
            pointer-events: none;
        }

        .book-category.category-sketches::after {

                gap: 1rem;
                padding: 1rem;
            }

            .book-image-item:nth-child(5n+1) {
                grid-column: span 1;
                grid-row: span 1;
            }

            .book-image-item:nth-child(7n+3) {
                grid-column: span 1;
                grid-row: span 1;
            }
        }

        @media (max-width: 480px) {
            .book-category {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 0.75rem;
            }

            .book-image-item:nth-child(5n+1) {
                grid-column: span 1;
            }

            .image-description {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
        }

        /* Modal/Lightbox Styles */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeInModal 0.3s ease;
            align-items: center;
            justify-content: center;
        }

        .image-modal.active {
            display: flex;
        }

        @keyframes fadeInModal {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8) rotateZ(-5deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotateZ(0deg);
                opacity: 1;
            }
        }

        .modal-content img {
            /* Limit modal image so it never feels too large on desktop */
            max-width: min(80vw, 1200px);
            max-height: 80vh;
            width: auto;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
            object-fit: contain;
            transform: translateZ(0);
        }

        @media (max-width: 480px) {
            .modal-content img {
                max-width: 95vw;
                max-height: 85vh;
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(167, 139, 250, 0.3);
            border: 2px solid rgba(167, 139, 250, 0.6);
            border-radius: 50%;
            color: #ffffff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2001;
        }

        .modal-close:hover {
            background: rgba(167, 139, 250, 0.6);
            transform: rotate(90deg) scale(1.1);
        }

        /* ===== VIDÉO TRANSITION NOIR-BLANC ===== */
        .video-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000;
            pointer-events: none;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .video-transition-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .transition-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0) brightness(0.5) contrast(4);
        }

        @keyframes mangaGlow {

        // Descriptions for the category intro box (separate from categoryDescriptions)
        const categoryIntroDescriptions = {
            'all': '',
            'manga': '',
            'compositions': '',
            'noir-blanc': '',
            'portraits': '',
            'sketches': ''
        };

        // Image descriptions with creative process
        const imageDescriptions = {

            'Portrait_Kirua.jpg': 'Portrait Kirua - Étude de personnage inspirée du manga "Hunter x Hunter". Travail sur les couleurs et la dynamique pour refléter ses capacités.',

            'inktober_1.PNG': 'Moustache - Jour 1. Exploration des textures au stylo fine liner sur papier 90g.',
            'inktober_2.PNG': 'Magie - Jour 2. Exploration des ombre, des jeux de lumières et de textures pour créer un effet de magie.',
            'inktober_3.jpg': 'Lien - Jour 3. Référence à une scène du film "Your Name".',
            'inktober_4.jpg': 'Fantôme - Jour 4. Travail du mouvement et de la fluidité d\'un corps.',
            'inktober_5.jpg': 'Couronne - Jour 5. Travail sur un objet et ses textures, ainsi que les impacts pour montrer sa composition.',
            'inktober_6.jpg': 'Trouble - Jour 6. Mise en avant des Yeux pour exprimer une émotion de trouble et de confusion.',
            'inktober_7.jpg': 'Cerf - Jour 7. Référence au cerf de Princesse Mononoké.',
            'inktober_8.jpg': 'Percer - Jour 8. Référence au personnage Hornet du jeu "Hollow Knight" et "Hollow Knight: Silksong" et à son arme emblématique.',
            'inktober_9.jpg': 'Étoile de mer - Jour 9. Référence à Patrick dans Bob l\'éponge.',
            'inktober_10.jpg': 'Imprudent - Jour 10. Composition d\'une scène avec un personnage en situation risquée et tout dessiné en noir pour montrer une silhouette peu précise qui représente le mot et pas quelqu\'un en particulier.',
            'inktober_11.jpg': 'Lourd - Jour 11. Travail sur un personnage et son mouvement avec une arme lourde.',
        };

        // Intersection Observer pour animations au scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '50px'
        };

        const imageObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.style.opacity = '1';
                        entry.target.style.animation = 'fadeInUp 0.6s cubic-bezier(0.4, 0.0, 0.2, 1) forwards';
                    }, index * 80);
                }
            });
        }, observerOptions);

        // Modal functions
        function openModal(imgSrc, index) {
            currentImageIndex = index;
            // On récupère le chemin de l'original via data-full
            const fullSrc = currentImages[index].querySelector('img').getAttribute('data-full') || imgSrc;
            modalImage.src = fullSrc;
            imageModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            updateModalNavigation();
        }

        function closeModalWindow() {
            imageModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateModalNavigation() {
            prevImageBtn.disabled = currentImageIndex === 0;
            nextImageBtn.disabled = currentImageIndex === currentImages.length - 1;
        }

        function nextImage() {
            if (currentImageIndex < currentImages.length - 1) {
                currentImageIndex++;
                const nextImg = currentImages[currentImageIndex].querySelector('img');
                const fullSrc = nextImg.getAttribute('data-full') || nextImg.src;
                modalImage.src = fullSrc;
                updateModalNavigation();
            }
        }

        function prevImage() {
            if (currentImageIndex > 0) {
                currentImageIndex--;
                const prevImg = currentImages[currentImageIndex].querySelector('img');
                const fullSrc = prevImg.getAttribute('data-full') || prevImg.src;
                modalImage.src = fullSrc;
                updateModalNavigation();
            }
        }

        // Load category and display all images with mosaic effect
        function loadCategory(category) {
            currentCategory = category;
            bookCategory.innerHTML = '';

            // Remove any existing category-* classes to avoid leftover styles (robust across browsers)
            Array.from(bookCategory.classList).forEach(c => {
                if (c.startsWith('category-')) bookCategory.classList.remove(c);
            });

            // Remove any inline styles that might persist across devices/ratios
            bookCategory.removeAttribute('style');

            // Add the current category class
            bookCategory.classList.add(`category-${category}`);

            // Force a reflow to ensure styles are recalculated immediately
            void bookCategory.offsetHeight;

            // Insert a category explanation box (styled with the category class)
            const prevIntro = document.querySelector('.category-intro');
            if (prevIntro) prevIntro.remove();
            const introBox = document.createElement('div');
            introBox.className = `category-intro category-${category}`;
            const activeTab = document.querySelector(`.category-tab[data-category="${category}"]`);
            const titleText = categoryIntroTitles[category] || (activeTab ? activeTab.textContent.trim() : category);
            const descText = (typeof categoryIntroDescriptions !== 'undefined') ? (categoryIntroDescriptions[category] || '') : '';
            introBox.innerHTML = `<div class="title">${titleText}</div><div class="desc">${descText}</div>`;
            // Insert before the book display so it appears under the tabs and above the images
            const bookDisplayEl = document.getElementById('bookDisplay');
            if (bookDisplayEl && bookDisplayEl.parentNode) {
                bookDisplayEl.parentNode.insertBefore(introBox, bookDisplayEl);
            } else {
                // fallback: append into the category container
                bookCategory.appendChild(introBox);
            }

            // If switching to 'all', force-reset the transition video and overlay to avoid lingering filters/overlays
            if (category === 'all') {
                const videoOverlay = document.getElementById('videoOverlay');
                const transitionVideo = document.getElementById('transitionVideo');
                if (videoOverlay) videoOverlay.classList.remove('active');
                if (transitionVideo) {
                    try { transitionVideo.pause(); } catch (e) {}
                    transitionVideo.removeAttribute('src');
                    try { transitionVideo.load(); } catch (e) {}
                    transitionVideo.className = 'transition-video';
                    transitionVideo.style.filter = '';
                    transitionVideo.muted = false;
                }
            }

            let categoryItems;
            if (category === 'all') {
                categoryItems = Array.from(galleryItems);
            } else {
                categoryItems = Array.from(galleryItems).filter(item => item.dataset.category === category);
            }

            currentImages = categoryItems; // Store current images for modal navigation

            // Files to display together as a special 2-per-row pair
            const pairFiles = ['Sketch_5.jpg', 'sketch_fanart_marino.jpg'];

            // Helper to build an item element
            function buildItem(item, index) {
                const img = item.querySelector('img');
                const srcAttr = img.getAttribute('src') || img.src;
                const fileName = decodeURIComponent(srcAttr.split('/').pop().split('?')[0]);
                const description = imageDescriptions[fileName] || imageDescriptions[fileName.toLowerCase()];

                const imageWrapper = document.createElement('div');
                imageWrapper.className = 'book-image-item';
                imageWrapper.style.opacity = '0';
                imageWrapper.setAttribute('data-filename', fileName);

                const imgWrapperDiv = document.createElement('div');
                imgWrapperDiv.className = 'book-image-wrapper';
                imgWrapperDiv.innerHTML = `<img src="${img.src}" alt="${img.alt}" loading="lazy">`;
                imageWrapper.appendChild(imgWrapperDiv);

                if (description) {
                    const descDiv = document.createElement('div');
                    descDiv.className = 'image-description';
                    descDiv.innerHTML = `<strong>💭 Processus créatif :</strong><p>${description}</p>`;
                    imageWrapper.appendChild(descDiv);
                } else {
                    const hintDiv = document.createElement('div');
                    hintDiv.className = 'image-description';
                    hintDiv.style.opacity = '0.5';
                    hintDiv.innerHTML = `<p style="font-style: italic; font-size: 0.85rem;">Créé avec passion ✨</p>`;
                    imageWrapper.appendChild(hintDiv);
                }

                imgWrapperDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(img.src, index);
                });

                imageWrapper.addEventListener('click', () => {
                    imageWrapper.style.animation = 'itemBounce 0.6s ease-in-out';
                    setTimeout(() => imageWrapper.style.animation = '', 600);
                });

                return { el: imageWrapper, fileName };
            }

            if (categoryItems.length > 0) {
                const normal = [];
                const pair = [];

                categoryItems.forEach((it, i) => {
                    const built = buildItem(it, i);
                    if (pairFiles.includes(built.fileName)) pair.push(built.el);
                    else normal.push(built.el);
                });

                // Compute number of columns from CSS
                const computed = window.getComputedStyle(bookCategory);
                const cols = Math.max((computed.gridTemplateColumns || '').split(' ').filter(Boolean).length, 1);

                // Default insertion: at end
                let insertAt = normal.length;

                // If last row would have exactly 1 item and we have both pair images, insert pair before last normal
                if (cols > 1 && (normal.length % cols) === 1 && pair.length === 2) {
                    insertAt = Math.max(0, normal.length - 1);
                }

                // Build final sequence with pair inserted
                const finalSeq = [];
                for (let i = 0; i < normal.length; i++) {
                    if (i === insertAt && pair.length === 2) {
                        const pairContainer = document.createElement('div');
                        pairContainer.className = 'book-image-pair';
                        // Inline styles to enforce exact 50% per child
                        pairContainer.style.display = 'flex';
                        pairContainer.style.flexDirection = 'row';
                        pairContainer.style.width = '100%';
                        pair.forEach(p => {
                            p.style.flex = '0 0 50%';
                            p.style.maxWidth = '50%';
                            const wrapper = p.querySelector('.book-image-wrapper');
                            if (wrapper) wrapper.style.width = '100%';
                            pairContainer.appendChild(p);
                        });
                        finalSeq.push(pairContainer);
                    }
                    finalSeq.push(normal[i]);
                }
                if (insertAt >= normal.length) {
                    if (pair.length === 2) {
                        const pairContainer = document.createElement('div');
                        pairContainer.className = 'book-image-pair';
                        pairContainer.style.display = 'flex';
                        pairContainer.style.flexDirection = 'row';
                        pairContainer.style.width = '100%';
                        pair.forEach(p => {
                            p.style.flex = '0 0 50%';
                            p.style.maxWidth = '50%';
                            const wrapper = p.querySelector('.book-image-wrapper');
                            if (wrapper) wrapper.style.width = '100%';
                            pairContainer.appendChild(p);
                        });
                        finalSeq.push(pairContainer);
                    } else {
                        pair.forEach(p => finalSeq.push(p));
                    }
                }

                // Append to DOM and observe
                finalSeq.forEach(node => {
                    bookCategory.appendChild(node);
                    if (node.classList && node.classList.contains('book-image-item')) imageObserver.observe(node);
                    else if (node.querySelectorAll) node.querySelectorAll('.book-image-item').forEach(c => imageObserver.observe(c));
                });

                categoryDescription.textContent = categoryDescriptions[category];

                // Update active tab
                categoryTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.category === category));
            }
        }

        // Event listeners for category tabs
        categoryTabs.forEach(tab => {
            console.log('Attaching listener to tab:', tab.dataset.category);
            tab.addEventListener('click', () => {
                console.log('Tab clicked:', tab.dataset.category);
                // Jouer la vidéo de transition pour certaines catégories
                const category = tab.dataset.category;
                const videosMap = {
                    'noir-blanc': 'assets/videos/transition B&W.mp4',
                    'manga': 'assets/videos/transition manga.mp4',
                    'compositions': 'assets/videos/transition compositions.mp4',
                    'sketches': 'assets/videos/transition sketch.mp4'
                };
                
                console.log('Checking video for category:', category, 'Has video?', !!videosMap[category]);

                // If there's no transition video for this category, ensure the overlay/video are stopped and cleared
                if (!videosMap[category]) {
                    const videoOverlay = document.getElementById('videoOverlay');
                    const transitionVideo = document.getElementById('transitionVideo');
                    if (videoOverlay) videoOverlay.classList.remove('active');
                    if (transitionVideo) {
                        try { transitionVideo.pause(); } catch(e) {}
                        transitionVideo.removeAttribute('src');
                        try { transitionVideo.load(); } catch(e) {}
                        transitionVideo.className = 'transition-video';
                        transitionVideo.style.filter = '';
                    }
                }

                if (videosMap[category]) {
                    const videoOverlay = document.getElementById('videoOverlay');
                    const transitionVideo = document.getElementById('transitionVideo');
                    
                    console.log('Lancement vidéo:', videosMap[category]);
                    
                    // Appliquer le filtre approprié : garder les couleurs pour "compositions"
                    transitionVideo.classList.remove('manga-filter');
                    // Par défaut on réinitialise le style inline
                    transitionVideo.style.filter = '';

                    if (category === 'manga') {
                        transitionVideo.classList.add('manga-filter');
                        // garder l'effet manga (désaturation + contraste)
                        transitionVideo.style.filter = 'saturate(0) brightness(0.5) contrast(4)';
                    } else if (category === 'noir-blanc') {
                        // forcer noir et blanc pour cette catégorie
                        transitionVideo.style.filter = 'saturate(0) brightness(0.5) contrast(4)';
                    } else if (category === 'compositions') {
                        // conserver les couleurs originales de la vidéo
                        transitionVideo.style.filter = 'none';
                    } else if (category === 'sketches') {
                        // sketches: garder la vidéo en couleur (pas de noir et blanc)
                        transitionVideo.classList.remove('manga-filter');
                        transitionVideo.style.filter = 'none';
                    }
                    
                    videoOverlay.classList.add('active');
                    transitionVideo.src = videosMap[category];
                    transitionVideo.load();
                    
                    // Attendre un peu que la vidéo se charge, puis jouer
                    setTimeout(() => {
                        const transitionSFX = document.getElementById('transitionSFX');

                        transitionVideo.currentTime = 0;
                        transitionVideo.playbackRate = (category === 'compositions') ? 1 : 2;
                        transitionVideo.play().catch(err => console.error('Erreur play:', err));

                        // Audio handling: only use SFX for manga; for noir-blanc and compositions use video's own audio
                        if (category === 'manga') {
                            transitionVideo.muted = true;
                            if (transitionSFX) {
                                transitionSFX.volume = 0.3;
                                transitionSFX.currentTime = 0;
                                transitionSFX.play().catch(err => console.error('Erreur audio:', err));
                            }
                        } else {
                            transitionVideo.muted = false;
                            transitionVideo.volume = 1;
                        }
                    }, 500);
                    
                    // Arrêter 0.2s avant la fin
                    transitionVideo.ontimeupdate = () => {
                        if (transitionVideo.currentTime >= transitionVideo.duration - 0.2) {
                            transitionVideo.pause();
                            videoOverlay.classList.remove('active');
                        }
                    };
                }
                // Charger la catégorie 1 seconde plus tard
                setTimeout(() => {
                    loadCategory(tab.dataset.category);
                }, 1000);
            });
        });

        // Modal controls
        closeModal.addEventListener('click', closeModalWindow);
        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) {
                closeModalWindow();
            }
        });
        prevImageBtn.addEventListener('click', prevImage);
        nextImageBtn.addEventListener('click', nextImage);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (imageModal.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevImage();
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'Escape') closeModalWindow();
            } else {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    const currentIndex = categories.indexOf(currentCategory);
                    if (e.key === 'ArrowLeft' && currentIndex > 0) {
                        categoryTabs[categories.indexOf(categories[currentIndex - 1])].click();
                    }
                    if (e.key === 'ArrowRight' && currentIndex < categories.length - 1) {
                        categoryTabs[categories.indexOf(categories[currentIndex + 1])].click();
                    }
                }
            }
        });

        // Initialize with all category
        loadCategory('all');
    </script>
