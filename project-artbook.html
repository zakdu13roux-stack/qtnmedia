<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Artistique | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes pixelSlide {
            0% {
                opacity: 0;
                transform: translateX(-120vw) scale(0.8);
            }
            70% {
                opacity: 1;
                transform: translateX(15px) scale(1.05);
            }
            85% {
                transform: translateX(-5px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        @keyframes floatBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .animated-title {
            animation: pixelSlide 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                       floatBounce 3s ease-in-out 1.8s infinite;
            opacity: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #ffffff !important;
            font-weight: 400;
            will-change: transform, opacity;
            background: none !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: #ffffff !important;
            text-shadow: 0 4px 12px rgba(196, 132, 252, 0.5) !important;
            background-clip: unset !important;
        }

        @media (max-width: 768px) {
            .animated-title {
                font-size: 1.2rem;
            }
        }

        /* Custom hero background for artbook */
        .project-hero {
            background: linear-gradient(135deg, rgba(196, 132, 252, 0.5), rgba(167, 139, 250, 0.5)) !important;
            background-color: #1e293b !important;
        }

        .project-hero::before {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(196, 132, 252, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.4) 0%, transparent 50%) !important;
        }

        .project-hero p {
            color: #e2e8f0 !important;
            font-weight: 600 !important;
            font-size: 1.4rem !important;
        }

        .back-button {
            background: rgba(167, 139, 250, 0.2) !important;
            color: #ffffff !important;
            border: 2px solid rgba(167, 139, 250, 0.5) !important;
            padding: 0.8rem 1.5rem !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            transition: all 0.3s ease !important;
            backdrop-filter: blur(10px) !important;
        }

        .back-button:hover {
            background: rgba(167, 139, 250, 0.4) !important;
            border-color: rgba(167, 139, 250, 0.8) !important;
            transform: translateX(-5px) !important;
            box-shadow: 0 5px 15px rgba(167, 139, 250, 0.3) !important;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0;
            padding: 0 1rem;
        }

        .category-tab {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(167, 139, 250, 0.5);
            background: rgba(167, 139, 250, 0.1);
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .category-tab:hover {
            background: rgba(167, 139, 250, 0.3);
            border-color: rgba(167, 139, 250, 0.8);
        }

        .category-tab.active {
            background: rgba(167, 139, 250, 0.5);
            border-color: rgba(167, 139, 250, 1);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        /* Gallery Section */
        .gallery-section {
            padding: 10px 0;
            background: rgba(15, 23, 42, 0.04);
        }

        /* Book Display */
        .book-display {
            display: flex;
            gap: 1.5rem;
            min-height: 900px;
            align-items: stretch;
            justify-content: center;
        }

        .book-category-nav-button {
            background: rgba(167, 139, 250, 0.3);
            color: #a78bfa;
            border: 2px solid rgba(167, 139, 250, 0.6);
            width: 50px;
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            align-self: center;
        }

        .book-category-nav-button:hover:not(:disabled) {
            background: rgba(167, 139, 250, 0.6);
            border-color: rgba(167, 139, 250, 1);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        .book-category-nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .book-category {
            flex: 0 1 auto;
            max-width: 95%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding: 0.5rem;
            border-radius: 12px;
            background: rgba(167, 139, 250, 0.05);
            border: 2px solid rgba(167, 139, 250, 0.3);
        }

        .book-category::-webkit-scrollbar {
            width: 8px;
        }

        .book-category::-webkit-scrollbar-track {
            background: rgba(167, 139, 250, 0.1);
            border-radius: 4px;
        }

        .book-category::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.5);
            border-radius: 4px;
        }

        .book-category::-webkit-scrollbar-thumb:hover {
            background: rgba(167, 139, 250, 0.7);
        }

        .book-image-item {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.2);
            transition: transform 0.3s ease;
        }

        .book-image-item img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 1000px;
            object-fit: contain;
        }

        .book-image-item:hover {
            transform: scale(1.02);
        }

        .gallery-grid {
            display: none;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: transparent;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item.hidden {
            display: none;
        }

        .category-description {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .category-tabs {
                gap: 0.5rem;
            }

            .category-tab {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Portfolio</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html#accueil" class="nav-link">Accueil</a></li>
                <li><a href="index.html#apropos" class="nav-link">Présentation</a></li>
                <li><a href="index.html#projets" class="nav-link">Réalisations</a></li>
                <li><a href="index.html#competences" class="nav-link">Compétences</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="project-hero">
        <div class="container">
            <div style="text-align: center;">
                <h1 class="animated-title">Galerie Artistique</h1>
                <p>Une collection de mes créations par catégories et thèmes</p>
                <a href="index.html#projets" class="back-button">← Retour aux projets</a>
            </div>
        </div>
    </section>

    <!-- Category Tabs -->
    <section class="project-section">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, #c084fc, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Catégories</h2>
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">Tous les dessins</button>
                <button class="category-tab" data-category="manga">Manga (5 pages)</button>
                <button class="category-tab" data-category="compositions">Compositions</button>
                <button class="category-tab" data-category="noir-blanc">Noir et Blanc</button>
                <button class="category-tab" data-category="inktober">Inktober</button>
                <button class="category-tab" data-category="references">Références artistiques</button>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <div class="category-description" id="categoryDescription">
                Explorez tous les dessins et créations artistiques
            </div>
            
            <!-- Book Display -->
            <div class="book-display" id="bookDisplay">
                <button class="book-category-nav-button" id="prevCategoryBtn" disabled>❮</button>
                
                <div class="book-category" id="bookCategory">
                    <!-- Images will be inserted here by JavaScript -->
                </div>
                
                <button class="book-category-nav-button" id="nextCategoryBtn">❯</button>
            </div>
            
            <!-- Hidden gallery grid for data storage -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Placeholder images - à remplacer par vos vraies images -->
                
                <!-- Manga (5 pages) -->
                <div class="gallery-item" data-category="manga">
                    <img src="assets/images_dessins/manga_1.PNG" alt="Manga Page 1">
                </div>
                <div class="gallery-item" data-category="manga">
                    <img src="assets/images_dessins/manga_2.PNG" alt="Manga Page 2">
                </div>
                <div class="gallery-item" data-category="manga">
                    <img src="assets/images_dessins/manga_3.PNG" alt="Manga Page 3">
                </div>
                <div class="gallery-item" data-category="manga">
                    <img src="assets/images_dessins/manga_4.PNG" alt="Manga Page 4">
                </div>
                <div class="gallery-item" data-category="manga">
                    <img src="assets/images_dessins/manga_5.PNG" alt="Manga Page 5">
                </div>

                <!-- Compositions -->
                <div class="gallery-item" data-category="compositions">
                    <img src="assets/images_dessins/compo inazuma_eleven.PNG" alt="Composition 1">
                </div>
                <div class="gallery-item" data-category="compositions">
                    <img src="assets/images_dessins/compo_gwendoline.PNG" alt="Composition 2">
                </div>
                <div class="gallery-item" data-category="compositions">
                    <img src="assets/images_dessins/compo_3.PNG" alt="Composition 3">
                </div>

                <!-- Noir et Blanc -->
                <div class="gallery-item" data-category="noir-blanc">
                    <img src="assets/images_dessins/spiderman.PNG" alt="Noir et Blanc 1">
                </div>
                <div class="gallery-item" data-category="noir-blanc">
                    <img src="assets/images_dessins/Hollow Knight.PNG" alt="Noir et Blanc 2">
                </div>
                <div class="gallery-item" data-category="noir-blanc">
                    <img src="assets/images_dessins/break_everything.PNG" alt="Noir et Blanc 3">
                </div>
                <div class="gallery-item" data-category="noir-blanc">
                    <img src="assets/images_dessins/Tired_eyes.PNG" alt="Noir et Blanc 3">
                </div>
                <div class="gallery-item" data-category="noir-blanc">
                    <img src="assets/images_dessins/Icare.PNG" alt="Noir et Blanc 3">
                </div>

                <!-- Inktober -->
                <div class="gallery-item" data-category="inktober">
                    <img src="assets/images_dessins/inktober_1.PNG" alt="Inktober 1">
                </div>
                <div class="gallery-item" data-category="inktober">
                    <img src="assets/images_dessins/inktober_2.PNG" alt="Inktober 2">
                </div>
                <div class="gallery-item" data-category="inktober">
                    <img src="assets/images_dessins/inktober_3.PNG" alt="Inktober 3">
                </div>

                <!-- Références artistiques -->
                <div class="gallery-item" data-category="references">
                    <img src="assets/images_dessins/reference_1.PNG" alt="Référence 1">
                </div>
                <div class="gallery-item" data-category="references">
                    <img src="assets/images_dessins/reference_2.PNG" alt="Référence 2">
                </div>
                <div class="gallery-item" data-category="references">
                    <img src="assets/images_dessins/reference_3.PNG" alt="Référence 3">
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 qtnmedia. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        const categoryTabs = document.querySelectorAll('.category-tab');
        const galleryItems = document.querySelectorAll('.gallery-item');
        const categoryDescription = document.getElementById('categoryDescription');
        const bookCategory = document.getElementById('bookCategory');
        const prevCategoryBtn = document.getElementById('prevCategoryBtn');
        const nextCategoryBtn = document.getElementById('nextCategoryBtn');

        const categories = ['manga', 'compositions', 'noir-blanc', 'inktober', 'references'];
        
        let currentCategoryIndex = 0;
        let currentCategory = categories[0];

        const categoryDescriptions = {
            'all': 'Explorez tous les dessins et créations artistiques',
            'manga': 'Un manga complet avec 5 pages - une histoire visuelle captivante',
            'compositions': 'Études de compositions et arrangements visuels savamment pensés',
            'noir-blanc': 'Dessins en noir et blanc explorant le contraste et les textures',
            'inktober': 'Créations de l\'Inktober - défi artistique d\'un dessin par jour',
            'references': 'Interprétations et références à d\'autres œuvres artistiques'
        };

        // Load category and display all images
        function loadCategory(category) {
            currentCategory = category;
            currentCategoryIndex = categories.indexOf(category);
            bookCategory.innerHTML = '';

            let categoryItems;
            if (category === 'all') {
                categoryItems = Array.from(galleryItems);
            } else {
                categoryItems = Array.from(galleryItems).filter(item => item.dataset.category === category);
            }

            if (categoryItems.length > 0) {
                categoryItems.forEach(item => {
                    const img = item.querySelector('img');
                    const imageWrapper = document.createElement('div');
                    imageWrapper.className = 'book-image-item';
                    imageWrapper.innerHTML = `<img src="${img.src}" alt="${img.alt}">`;
                    bookCategory.appendChild(imageWrapper);
                });
                
                categoryDescription.textContent = categoryDescriptions[category];
                
                // Update active tab
                categoryTabs.forEach(tab => {
                    if (tab.dataset.category === category) {
                        tab.classList.add('active');
                    } else {
                        tab.classList.remove('active');
                    }
                });

                // Scroll to top
                bookCategory.scrollTop = 0;
                
                // Update buttons
                updateCategoryButtons();
            }
        }

        function updateCategoryButtons() {
            prevCategoryBtn.disabled = currentCategoryIndex === 0;
            nextCategoryBtn.disabled = currentCategoryIndex === categories.length - 1;
        }

        function goToPreviousCategory() {
            if (currentCategoryIndex > 0) {
                loadCategory(categories[currentCategoryIndex - 1]);
            }
        }

        function goToNextCategory() {
            if (currentCategoryIndex < categories.length - 1) {
                loadCategory(categories[currentCategoryIndex + 1]);
            }
        }

        // Event listeners for category tabs
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                loadCategory(tab.dataset.category);
            });
        });

        // Event listeners for category navigation buttons
        prevCategoryBtn.addEventListener('click', goToPreviousCategory);
        nextCategoryBtn.addEventListener('click', goToNextCategory);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goToPreviousCategory();
            if (e.key === 'ArrowRight') goToNextCategory();
        });

        // Initialize with manga category
        loadCategory('manga');
    </script>
</body>
</html>
